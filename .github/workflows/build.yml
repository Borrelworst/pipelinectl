name: Build Binaries

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyinstaller -e .
      - run: pyinstaller --onefile --name pipelinectl entry_point.py
      - name: Package binary
        run: tar -czf pipelinectl-${GITHUB_REF_NAME}-macos-arm64.tar.gz -C dist pipelinectl
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: "pipelinectl-*.tar.gz"
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}

  update-formula:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Get release asset SHA256
        id: assets
        run: |
          VERSION=${GITHUB_REF_NAME}
          URL="https://github.com/Borrelworst/pipelinectl/releases/download/${VERSION}/pipelinectl-${VERSION}-macos-arm64.tar.gz"
          SHA=$(curl -sL "$URL" | sha256sum | awk '{print $1}')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT
      - name: Update Homebrew formula
        run: |
          git clone https://x-access-token:${{ secrets.RELEASE_PLEASE_TOKEN }}@github.com/Borrelworst/homebrew-pipelinectl.git
          cd homebrew-pipelinectl
          VERSION=${GITHUB_REF_NAME#v}
          cat > Formula/pipelinectl.rb << EOF
          class Pipelinectl < Formula
            desc "CLI wrapper to trigger and tail Azure DevOps pipelines"
            homepage "https://github.com/Borrelworst/pipelinectl"
            license "MIT"
            version "${VERSION}"

            url "${{ steps.assets.outputs.url }}"
            sha256 "${{ steps.assets.outputs.sha }}"

            def install
              bin.install "pipelinectl"
            end

            test do
              assert_match "pipelinectl", shell_output("#{bin}/pipelinectl --help")
            end
          end
          EOF
          git config user.email "github-actions@github.com"
          git config user.name "github-actions"
          git add Formula/pipelinectl.rb
          git commit -m "chore: update pipelinectl to ${VERSION}"
          git push
